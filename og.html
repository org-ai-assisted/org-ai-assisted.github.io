<!--
  OG card source for org-ai-assisted.github.io. AI-Assisted.
  Rendered headless at 1200x630 to og.png; not served directly.
-->
<meta charset="utf-8">
<style>
  :root{
    --bg:#f3f2ee; --card:#fbfbf9; --ink:#17181b; --muted:#6b6f76;
    --line:#e4e2da; --accent:#d83933;
    --mono:ui-monospace,"Cascadia Code","DejaVu Sans Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,"Segoe UI",Roboto,"DejaVu Sans",Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0}
  html,body{width:1200px;height:630px}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);
    padding:72px 76px;display:flex;flex-direction:column;justify-content:space-between}
  .brand{font-family:var(--mono);font-weight:700;font-size:32px;letter-spacing:-.02em;
    display:flex;align-items:baseline}
  .brand b{color:var(--accent)}
  .brand .tm{font-size:16px;color:var(--muted);margin-left:6px;font-weight:600;align-self:flex-start}
  .kicker{font-family:var(--mono);font-size:22px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--accent);margin-bottom:22px}
  h1{font-size:62px;line-height:1.06;letter-spacing:-.02em;font-weight:800;max-width:20ch}
  .pill{display:inline-block;font-family:var(--mono);font-size:18px;letter-spacing:.06em;
    text-transform:uppercase;color:#fff;background:var(--accent);
    border-radius:8px;padding:8px 14px;margin-top:26px}
  .foot{font-family:var(--mono);font-size:24px;color:var(--muted);
    display:flex;justify-content:space-between;align-items:flex-end}
  .foot b{color:var(--ink)}
</style>
<body>
  <div class="brand">
    org-<b>ai</b>-assisted<span class="tm">&trade;</span>
  </div>
  <div>
    <div class="kicker">Bot / machine organisation &middot; AI-assisted</div>
    <h1>How AI-assisted contributions to Kicksecure and Whonix are handled.</h1>
    <span class="pill">Unreviewed draft &middot; pending human review</span>
  </div>
  <div class="foot">
    <span>org-ai-assisted.github.io</span>
    <span>AI has <b>no write access</b> upstream</span>
  </div>
</body>
